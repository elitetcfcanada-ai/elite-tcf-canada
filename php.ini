; Configuration PHP pour Hostinger
; Ajustez ces valeurs selon les limites de votre hébergement

upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 300
memory_limit = 256M
max_input_time = 300

; Extensions requises
extension=pdo_mysql
extension=mbstring
extension=json
extension=curl
extension=gd
